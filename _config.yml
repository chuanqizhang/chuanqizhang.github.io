# Site settings
title: Chuanqi Blog
header-img: img/bg/bg_index.jpg
description: ""
keyword: ""
url: "http://chuanqi.github.io"              # your host, for absolute URL
baseurl: ""                             # for example, '/blog' if your blog hosted on 'host/blog'


# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md","README.zh.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`

# Plugins
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM                            # use Github Flavored Markdown !important

# Baidu Share
bd_share: false                          # whether or not using baidu share


# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: 'My full name is <b>Chuanqi Zhang</b> <br>(Chinese: <b>传奇</b> <b>张</b>). <font size=1>&nbsp;</font>At present, I <br>am a graduate student majoring <br>in mathematics at <a href="https://www.wisc.edu/">the University <br>of Wisconsin-Madison</a>.'
sidebar-avatar: /img/me.jpeg      # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true                     # whether or not using Feature-Tags
featured-condition-size: 0              # A tag will be featured if the size of it is more than this condition value

